services:
  mt5:
    build:
      context: .
    image: metatrader5-service:dev
    platform: linux/amd64
    restart: unless-stopped
    security_opt:
      - seccomp:unconfined
    ports:
      - "3000:3000"
      - "${HTTP_PORT:-8000}:${HTTP_PORT:-8000}"
    volumes:
      - .:/workspace/metatrader5-service
    environment:
      CUSTOM_USER: ${VNC_USER}
      PASSWORD: ${VNC_PASSWORD}
      PUID: ${PUID}
      PGID: ${PGID}
      HTTP_PORT: ${HTTP_PORT:-8000}
      MT5_LOGIN: ${MT5_LOGIN:-}
      MT5_PASSWORD: ${MT5_PASSWORD:-}
      MT5_SERVER: ${MT5_SERVER:-}
