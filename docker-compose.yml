services:
  mt5:
    build:
      context: .
    image: metatrader5-docker:dev
    platform: linux/amd64
    restart: unless-stopped
    security_opt:
      - seccomp:unconfined
    ports:
      - "3000:3000"
      - "${HTTP_PORT:-8000}:${HTTP_PORT:-8000}"
    volumes:
      - .:/workspace/metatrader5-service
    environment:
      CUSTOM_USER: ${CUSTOM_USER}
      PASSWORD: ${PASSWORD}
      PUID: ${PUID}
      PGID: ${PGID}
      MT5_CMD_OPTIONS: ${MT5_CMD_OPTIONS:-}
      HTTP_PORT: ${HTTP_PORT:-8000}
      MT5_LOGIN: ${MT5_LOGIN:-}
      MT5_PASSWORD: ${MT5_PASSWORD:-}
      MT5_SERVER: ${MT5_SERVER:-}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-metatrader5-config-dev-824597117854-ap-southeast-1-an}
      AWS_REGION: ${AWS_REGION:-ap-southeast-1}
      USER_CONFIG_USER_ID: ${USER_CONFIG_USER_ID:-1}
      USER_CONFIG_SERVER: ${USER_CONFIG_SERVER:-EBCFinancialGroupKY-Demo}
      USER_CONFIG_ACCOUNT: ${USER_CONFIG_ACCOUNT:-51236}
