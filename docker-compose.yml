services:
  mt5:
    build:
      context: .
      args:
        PYTHON_VERSION: ${PYTHON_VERSION:-3.9.13}
    image: metatrader5-docker:dev
    platform: linux/amd64
    restart: unless-stopped
    security_opt:
      - seccomp:unconfined
    ports:
      - "3000:3000"
    environment:
      CUSTOM_USER: ${CUSTOM_USER}
      PASSWORD: ${PASSWORD}
      PUID: ${PUID}
      PGID: ${PGID}
      MT5_CMD_OPTIONS: ${MT5_CMD_OPTIONS:-}
